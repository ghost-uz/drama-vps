# ==============================================================================
# Drama.uz — CI (P13-T1)
#
# Har push (main) va har PR'da 5 parallel job:
#   lint                — pre-commit (ruff lint+format, mypy core, gigiyena)
#                         lokal hook'lar bilan AYNAN bir xil konfiguratsiya.
#   test                — pytest (sqlite :memory:, tez) + coverage gate
#                         (pyproject fail_under=73) + OpenAPI sxema validatsiyasi.
#   migrations-postgres — migratsiyalar REAL postgres'da qo'llanadi + drift check
#                         (sqlite testlar ushlamaydigan postgres-xatolarni topadi).
#   docker-build        — production image quriladi (push'siz).
#   security            — pip-audit (ma'lum CVE) + gitleaks (sir skan) [P10-T4].
#   e2e                 — Playwright E2E (live_server) — FAQAT nightly/qo'lda [P11-T4].
#
# "Yashil bo'lmasa merge bloklanadi" uchun (bir martalik, GitHub UI):
#   Settings -> Branches -> Add branch protection rule (main) ->
#   Require status checks to pass -> lint, test, migrations-postgres,
#   docker-build, security ni belgilang. Batafsil: docs/ops/ci.md
# ==============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
  # E2E nightly [P11-T4] + qo'lda ishga tushirish (PR/push'ni bloklamaydi)
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Bog'liqliklar
        run: pip install -r requirements/dev.txt
      - name: pre-commit (barcha fayllar)
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Bog'liqliklar
        run: pip install -r requirements/dev.txt
      - name: pytest + coverage gate (fail_under pyproject'da)
        run: pytest --cov -q
      - name: OpenAPI sxema validatsiyasi (drf-spectacular)
        run: python manage.py spectacular --validate --file /dev/null
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

  migrations-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: drama_ci
          POSTGRES_USER: drama_ci
          POSTGRES_PASSWORD: drama_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drama_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_NAME: drama_ci
      DB_USER: drama_ci
      DB_PASSWORD: drama_ci
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Bog'liqliklar
        run: pip install -r requirements/dev.txt
      - name: Migratsiyalar postgres'da toza qo'llanadi
        run: python manage.py migrate --no-input
      - name: Model-migratsiya drift yo'q
        run: python manage.py makemigrations --check --dry-run
      - name: Postgres-maxsus testlar (FTS/trigram) [P8-T1]
        run: pytest -m postgres -q
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test_postgres

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Production image build (push'siz)
        run: docker build -t drama-web:ci .

  security:
    # Zaif paket (CVE) + sir skan [P10-T4] — ikkalasidan biri topilsa CI qizil.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks push/PR oralig'idagi commitlarni skanerlaydi
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit — pinned bog'liqliklarda ma'lum CVE bormi
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt -r requirements/prod.txt
      - name: gitleaks — sir (kalit/token/parol) skan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  e2e:
    # Ixtiyoriy nightly [P11-T4]: PR/push'ni BLOKLAMAYDI — faqat jadval (03:00 UTC)
    # yoki qo'lda (workflow_dispatch). Playwright + live_server, sekin + brauzer.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/dev.txt
      - name: Bog'liqliklar
        run: pip install -r requirements/dev.txt
      - name: Playwright brauzer (chromium + OS deps)
        run: python -m playwright install --with-deps chromium
      - name: E2E oqim testlari (pytest -m e2e; flaky reruns [barqarorlik])
        # Timeout jitter'i yutildi (e2e/conftest.py 15s) + yiqilgan testni 2 marta
        # qayta yuritamiz: transient brauzer/tarmoq flake'i nightly'ni qizartirmaydi,
        # haqiqiy regressiya esa 3 urinishda ham yiqilib baribir ko'rinadi.
        run: pytest -m e2e -q --reruns 2 --reruns-delay 1
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
