<style>
    .hero-swiper {
        width: 100%;
        height: 500px;
    }

    @media (min-width: 768px) {
        .hero-swiper {
            height: 650px;
        }
    }

    .swiper-button-next,
    .swiper-button-prev {
        color: #00cc4c !important;
    }

    .swiper-pagination-bullet-active {
        background: #00cc4c !important;
    }
    /* Slayder ichidagi matn animatsiyasi */

    .swiper-slide-active h1 {
        animation: fadeInUp 0.8s both;
    }

    .swiper-slide-active p {
        animation: fadeInUp 1s both 0.2s;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    const swiper = new Swiper('.hero-swiper', {
        loop: true
        , autoplay: {
            delay: 5000
            , disableOnInteraction: false
        }
        , pagination: {
            el: '.swiper-pagination'
            , clickable: true
        }
        , navigation: {
            nextEl: '.swiper-button-next'
            , prevEl: '.swiper-button-prev'
        }
        , effect: 'fade'
        , fadeEffect: {
            crossFade: true
        }
    });
</script>
