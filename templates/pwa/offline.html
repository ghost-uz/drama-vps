{% load i18n %}{% get_current_language as LANGUAGE_CODE %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <title>{% trans "Oflayn — Drama.Uz" %}</title>
    <style>
        /* Inline + tashqi bog'liqliksiz: oflaynda hech qanday CDN/font yuklanmaydi */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #050505; color: #fff; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px;
        }
        .wrap { max-width: 420px; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 28px; }
        .logo span { color: #00cc4c; }
        .badge {
            width: 96px; height: 96px; margin: 0 auto 24px; border-radius: 50%;
            border: 3px solid rgba(0, 204, 76, 0.25);
            display: flex; align-items: center; justify-content: center;
            color: #00cc4c; font-size: 2.4rem;
        }
        h1 { font-size: 1.4rem; margin-bottom: 12px; }
        p { color: #9ca3af; font-size: .95rem; line-height: 1.6; margin-bottom: 28px; }
        button {
            background: #00cc4c; color: #000; border: none; font-weight: 800;
            padding: 14px 30px; border-radius: 9999px; font-size: .85rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        button:active { transform: scale(.97); }
        button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="logo">Drama<span>.Uz</span></div>
        <div class="badge" aria-hidden="true">&#9889;</div>
        <h1>{% trans "Internet aloqasi yo'q" %}</h1>
        <p>{% trans "Hozircha tarmoqqa ulanmadingiz. Ulanishni tekshirib, qayta urinib ko'ring — ko'rgan sahifalaringiz keshdan ochilishi mumkin." %}</p>
        <button type="button" onclick="location.reload()">{% trans "Qayta urinish" %}</button>
    </main>
</body>
</html>
