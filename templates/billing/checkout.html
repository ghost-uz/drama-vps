{% extends 'base.html' %}

{% block title %}Payme orqali to'ldirish | Drama.uz{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#050505] text-white py-16 px-4">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-[#00cc4c]/10 border border-[#00cc4c]/30 mb-4">
                <i class="fas fa-wallet text-3xl text-[#00cc4c]"></i>
            </div>
            <h1 class="text-3xl font-black">Payme orqali to'ldirish</h1>
            <p class="text-gray-400 text-sm mt-2">1 000 UZS = 1 Coin. To'lov tasdiqlangach Coin avtomatik qo'shiladi.</p>
        </div>

        <form method="POST" action="{% url 'billing:checkout' %}" class="bg-[#0f0f0f] border border-[#1f1f1f] rounded-3xl p-8">
            {% csrf_token %}
            <label class="block text-xs text-gray-500 uppercase font-bold mb-2">Summa (UZS)</label>
            <input type="number" name="amount_uzs" min="{{ min_amount }}" step="1000" value="10000" required
                   class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-lg outline-none focus:border-[#00cc4c] transition-colors">
            <p class="text-[11px] text-gray-500 mt-2">Eng kam: {{ min_amount }} UZS</p>

            <button type="submit"
                    class="w-full mt-6 py-4 bg-[#00cc4c] text-black font-black text-lg uppercase tracking-widest rounded-2xl hover:bg-[#00ff62] transition-all">
                Payme'ga o'tish
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{% url 'users:topup' %}" class="text-sm text-gray-400 hover:text-[#00cc4c] transition">
                Yoki qo'lda chek yuklash
            </a>
        </div>
    </div>
</div>
{% endblock %}
