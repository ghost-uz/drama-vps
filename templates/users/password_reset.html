{% extends 'base-users.html' %}
{% load crispy_forms_tags %}

{% block title %}Parolni tiklash - Drama.uz{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key fa-3x text-primary"></i>
                        <h2 class="fw-bold mt-2">Parolni tiklash</h2>
                        <p class="text-muted small">Email manzilingizni kiriting — tiklash havolasini yuboramiz.</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid mt-4">
                            <button class="btn btn-primary btn-lg rounded-pill" type="submit">Havola yuborish</button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <small class="text-muted"><a href="{% url 'users:login' %}" class="text-decoration-none">Kirishga qaytish</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
