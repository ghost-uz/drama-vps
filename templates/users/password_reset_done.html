{% extends 'base-users.html' %}

{% block title %}Havola yuborildi - Drama.uz{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-envelope-circle-check fa-3x text-success"></i>
                    <h2 class="fw-bold mt-3">Havola yuborildi</h2>
                    <p class="text-muted mt-3">
                        Agar kiritilgan email hisobga bog'langan bo'lsa, parolni tiklash
                        havolasi yuborildi. Spam papkasini ham tekshiring.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-outline-primary rounded-pill mt-3">Kirishga qaytish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
