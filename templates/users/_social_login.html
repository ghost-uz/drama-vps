{% load socialaccount %}
{# Ijtimoiy login tugmalari [P6-T2] — faqat tegishli sozlama berilgan bo'lsa #}
{% if google_login_enabled or telegram_login_bot %}
  <div class="text-center my-3">
    <small class="text-muted">— yoki tezkor kirish —</small>
  </div>
  {% if google_login_enabled %}
    <div class="d-grid mb-2">
      <a href="{% provider_login_url 'google' %}"
         class="btn btn-outline-danger rounded-pill">
        <i class="fab fa-google me-2"></i>Google bilan davom etish
      </a>
    </div>
  {% endif %}
  {% if telegram_login_bot %}
    <div class="d-flex justify-content-center mt-2">
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="{{ telegram_login_bot }}"
        data-size="large" data-radius="20"
        data-auth-url="{% url 'users:telegram_login' %}"
        data-request-access="write"></script>
    </div>
  {% endif %}
{% endif %}
