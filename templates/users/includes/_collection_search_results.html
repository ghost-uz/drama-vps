{# Kolleksiyaga qo'shish qidiruvi natijalari [V2B-T4] — HTMX fragment #}
{% for movie in results %}
<form method="post" action="{% url 'users:collection_add' collection.slug %}" class="flex items-center justify-between gap-3 bg-white/3 border border-white/5 rounded-xl p-2.5">
    {% csrf_token %}
    <input type="hidden" name="movie_id" value="{{ movie.id }}">
    <span class="text-sm font-bold truncate">{{ movie.title }}</span>
    <button type="submit" class="shrink-0 px-3 py-1.5 bg-[#00cc4c]/15 text-[#00cc4c] text-xs font-black rounded-lg hover:bg-[#00cc4c]/25 transition-colors">
        <i class="fas fa-plus"></i> Qo'shish
    </button>
</form>
{% empty %}
{% if q %}<p class="text-xs text-gray-500 p-2">Hech narsa topilmadi.</p>{% endif %}
{% endfor %}
