<div class="group relative bg-[#0f0f0f] rounded-2xl overflow-hidden border border-white/5 {{ glow_class }} movie-card-glow transition-all duration-500">
    <div class="aspect-[2/3] overflow-hidden relative">
        <img src="{{ item.movie.poster.url }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">

        {% if item.score %}
        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg border border-white/10">
            <p class="text-[10px] font-black text-[#00cc4c]">★ {{ item.score }}</p>
        </div>
        {% endif %}

        {% if item.status == 1 %}
        <div class="absolute bottom-0 left-0 right-0 h-1 bg-white/10">
            <div class="h-full bg-blue-500" style="width: {% widthratio item.current_episode item.movie.episodes_count 100 %}%"></div>
        </div>
        {% endif %}
    </div>

    <div class="p-3 space-y-1">
        <h4 class="text-[11px] font-bold truncate group-hover:text-[#00cc4c] transition-colors">{{ item.movie.title }}</h4>
        <div class="flex justify-between items-center text-[9px] font-medium text-gray-500">
            <span>{{ item.movie.year }}</span>
            {% if item.current_episode > 0 %}
            <span class="text-blue-400">EP: {{ item.current_episode }} / {{ item.movie.episodes_count }}</span>
            {% endif %}
        </div>
    </div>

    <a href="{{ item.movie.get_absolute_url }}" class="absolute inset-0 z-10"></a>
</div>
