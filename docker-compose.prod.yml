# ==============================================================================
# Prod CD override [P13-T2] — registry image + AJRATILGAN migratsiya.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml <buyruq>
#
# Zero-downtime tamoyili:
#   1) migratsiya + collectstatic ALOHIDA bir martalik `migrate` servisida
#      (web startup'iga bog'liq EMAS) -> eski web ishlab turgan holda bajariladi
#      (migratsiyalar backward-compatible = expand/contract bo'lishi SHART);
#   2) keyin web qayta yaratiladi, /healthz sog'lom bo'lgach nginx trafik beradi.
# Batafsil: docs/ops/deploy.md
# ==============================================================================

x-prod-env: &prod-env
  DJANGO_SETTINGS_MODULE: config.settings.prod
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  # Web migratsiya QILMAYDI (ajratildi) — faqat gunicorn ishlaydi.
  # GCS service-account kaliti [P0-T2]: serverda <repo>/secrets/gcs.json
  # (gitignore'da) -> konteynerga read-only mount; .env:
  #   GS_CREDENTIALS_FILE=/app/secrets/gcs.json
  web:
    environment:
      <<: *prod-env
      RUN_MIGRATIONS: "0"
      COLLECTSTATIC: "0"
      # [P9-T3] Ilova trafigi PgBouncer orqali (migrate/db-backup db'ga to'g'ridan-to'g'ri)
      DB_HOST: pgbouncer
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_started

  celery-worker:
    environment:
      DB_HOST: pgbouncer  # [P9-T3]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_started

  celery-beat:
    environment:
      DB_HOST: pgbouncer  # [P9-T3]
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_started

  # [P9-T3] Ulanish puli: ko'p gunicorn/celery ulanishi ozgina real Postgres
  # ulanishiga multiplexlanadi (transaction pooling). Django tomonida
  # DISABLE_SERVER_SIDE_CURSORS=True (prod.py) SHART. migrate va db-backup
  # ATAYLAB pooler'siz — DDL/pg_dump uzun tranzaksiyalari to'g'ridan-to'g'ri db'ga.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-drama_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD .env'da bo'lishi shart}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
    depends_on:
      db:
        condition: service_healthy

  # Bir martalik migratsiya + collectstatic. `up` bilan AVTO ishga tushmaydi
  # (profiles: tools) — deploy skripti `run --rm migrate` bilan chaqiradi.
  migrate:
    image: ${IMAGE_NAME:-drama-web}:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    restart: "no"
    env_file: .env
    environment:
      <<: *prod-env
    command: >-
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy

  # Prod nginx: TLS terminatsiya Cloudflare Origin CA sertifikati bilan.
  #  - conf: ssl.conf ni default.conf O'RNIGA mount qilamiz (bir xil target yo'l
  #    => compose merge'da shu g'olib bo'ladi; base'dagi HTTP-only conf tushadi).
  #  - certs: serverda /opt/drama/nginx/certs/ (gitignore'da, qo'lda yuklangan).
  #  - 443 porti base'dagi 80 ustiga QO'SHILADI (ports merge additiv).
  nginx:
    ports:
      - "${WEB_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  # Avtomatik kunlik DB backup [P13-T3] — busybox crond har kun 03:00 da
  # scripts/backup.sh ni ishga tushiradi (pg_dump + saqlash siyosati + GCS).
  # pg_dump postgres image'ida bor -> web image'iga postgres-client kerak emas.
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${DB_USER:-drama_user}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD .env'da bo'lishi shart}
      PGDATABASE: ${DB_NAME:-drama_db}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      GCS_BACKUP_BUCKET: ${GCS_BACKUP_BUCKET:-}
    volumes:
      - ./scripts:/scripts:ro
      - dbbackups:/backups
    # busybox crond: crontab yozadi, keyin oldenda ishlaydi (-f), log darajasi 8
    entrypoint:
      - sh
      - -c
      - 'echo "0 3 * * * sh /scripts/backup.sh" > /etc/crontabs/root && exec crond -f -l 8'
    depends_on:
      db:
        condition: service_healthy


# db-backup sidecar uchun backup dump'lari volume'i [P13-T3]
volumes:
  dbbackups:
