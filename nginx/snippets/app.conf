# ==============================================================================
# Drama.uz — umumiy `server {}` tanasi (HTTP ham, HTTPS ham shuni include qiladi).
#
#   default.conf (dev, :80)  --\
#                              >-- include /etc/nginx/snippets/app.conf
#   ssl.conf     (prod, :443)--/
#
# DIQQAT: bu yerda FAQAT `server` konteksti direktivalari bo'lsin.
# `upstream`/`listen`/`ssl_*` — chaqiruvchi fayllarda (ular server'ga xos).
# ==============================================================================

# Video/poster yuklash uchun (DATA_UPLOAD_MAX_MEMORY_SIZE = 500MB)
client_max_body_size 500M;

# --- Gzip siqish ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml application/json
    application/javascript application/rss+xml
    font/woff font/woff2 image/svg+xml;

# --- Proxy sarlavhalari: SERVER darajasida (har bir location meros oladi) ---
#
# !!! BU YERGA E'TIBOR — o'tmishda shu yerda bug bor edi !!!
# nginx'da `proxy_set_header` joriy darajaga meros bo'ladi FAQAT o'sha darajada
# birorta ham proxy_set_header bo'lmasa. Ilgari `Host $host` faqat `location /`
# ichida edi -> `location = /healthz` o'z sarlavhasini bermagani uchun nginx
# DEFAULT'ni ishlatardi: `Host $proxy_host` = upstream nomi = "django".
# "django" ALLOWED_HOSTS'da yo'q -> Django DisallowedHost -> 400 Bad Request
# (tashqi uptime-monitor /healthz'dan 200 emas, 400 olardi).
#
# Shu sabab proxy sarlavhalari SHU YERDA, server darajasida turadi.
# location'lar ichiga proxy_set_header QO'SHMANG — aks holda o'sha location
# quyidagi 4 tasini BUTUNLAY yo'qotadi va bug qaytadi.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# Django SECURE_PROXY_SSL_HEADER shuni o'qiydi (settings/prod.py).
# :443 blokida $scheme = https => Django HTTPS'ni taniydi va SECURE_SSL_REDIRECT
# qayta-qayta yo'naltirmaydi (redirect loop yo'q).
proxy_set_header X-Forwarded-Proto $scheme;

# --- Statik fayllar (lokal volume) ---
location /static/ {
    alias /app/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# --- Media fayllar ---
location /media/ {
    alias /app/media/;
    expires 7d;
    add_header Cache-Control "public";
    # Foydalanuvchi yuklagan fayllar: brauzer kengaytmadan boshqa turni
    # "hidlab" bajarishining (masalan, rasm ichidagi HTML) oldini oladi.
    add_header X-Content-Type-Options "nosniff";
    access_log off;
}

# --- Healthcheck (log'siz) ---
# Tashqi uptime-monitor https://drama.uz/healthz ni tekshiradi (monitoring.md).
# Proxy sarlavhalari yuqoridan (server darajasi) meros olinadi — bu yerga
# proxy_set_header qo'shilsa Host yo'qoladi va 400 qaytadi (yuqoridagi izoh).
location = /healthz {
    proxy_pass http://django;
    access_log off;
}

# --- Django (gunicorn) ---
location / {
    proxy_pass http://django;
    proxy_redirect off;

    # Deploy paytida web bir zum tushsa (ulanish rad/timeout/502...) nginx
    # qayta uradi -> foydalanuvchi uzilishni sezmaydi (near-zero-downtime).
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_connect_timeout 2s;
}
