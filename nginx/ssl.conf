# ==============================================================================
# Drama.uz — nginx PROD: TLS (443) Cloudflare Origin CA sertifikati bilan.
#
#   Foydalanuvchi --https--> Cloudflare --https(origin cert)--> nginx:443 --> web:8000
#
# Sertifikatlar serverda /opt/drama/nginx/certs/ da (gitignore'da!), konteynerga
# read-only mount qilinadi -> /etc/nginx/certs/. docker-compose.prod.yml bu
# faylni default.conf o'rniga mount qiladi.
#
# MUHIM: Origin CA sertifikati OMMAVIY ISHONCHLI EMAS — uni faqat Cloudflare
# taniydi. Shu sabab Cloudflare SSL rejimi "Full (strict)" bo'lishi SHART va
# saytga TO'G'RIDAN (IP orqali) kirilganda brauzer ogohlantirish beradi — bu
# kutilgan holat. Muddati 15 yil, renewal KERAK EMAS (Let's Encrypt'dan farqi).
# ==============================================================================

upstream django {
    server web:8000 max_fails=0;
}

# HTTP (80): Full (strict) da Cloudflare origin bilan 443 orqali gaplashadi,
# shu sabab bu yerga asosan to'g'ridan-IP so'rovlar (skanerlar) tushadi.
server {
    listen 80;
    server_name _;

    # Host SHART: bo'lmasa nginx default `Host $proxy_host` = "django" yuboradi
    # va Django DisallowedHost -> 400 qaytaradi (snippets/app.conf'dagi izoh).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ATAYLAB yo'naltirilmaydi: TLS/Cloudflare buzilganda ham serverdan
    # `curl http://localhost/healthz` bilan app tirikligini tekshirish kerak.
    # (301 qaytsa `curl -f` uni "o'tdi" deb olardi => soxta-sog'lik —
    # prod.py SECURE_REDIRECT_EXEMPT dagi mantiqning xuddi o'zi.)
    location = /healthz {
        proxy_pass http://django;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # --- Cloudflare Origin CA sertifikati ---
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # --- TLS sozlamalari ---
    # TLSv1.0/1.1 yoqilmaydi (eskirgan). Cloudflare edge TLSv1.2+ ni qo'llaydi.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling ATAYLAB YOQILMAGAN: Origin CA sertifikatlarida OCSP
    # responder yo'q -> yoqilsa nginx faqat xato log yozadi, foydasi yo'q.

    include /etc/nginx/snippets/app.conf;
}
