# ==============================================================================
# Drama.uz — nginx: reverse proxy + statik/media + gzip + cache header.
# Prod'da statik GCS CDN (cdn.drama.uz) orqali kelsa, /static/ va /media/
# location'lari ishlatilmay turadi (zararsiz) — lokal/WhiteNoise rejimga tayyor.
# SSL terminatsiya tashqarida (Cloudflare); bu yerda faqat HTTP (80).
# ==============================================================================

# max_fails=0: web deploy paytida (qayta yaratilganda) nginx upstream'ni
# "o'lik" deb belgilab qo'ymaydi — qisqa uzilishda qayta uriradi [P13-T2].
upstream django {
    server web:8000 max_fails=0;
}

server {
    listen 80;
    server_name _;

    # Video/poster yuklash uchun (DATA_UPLOAD_MAX_MEMORY_SIZE = 500MB)
    client_max_body_size 500M;

    # --- Gzip siqish ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/rss+xml
        font/woff font/woff2 image/svg+xml;

    # --- Statik fayllar (lokal volume) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Media fayllar ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Foydalanuvchi yuklagan fayllar: brauzer kengaytmadan boshqa turni
        # "hidlab" bajarishining (masalan, rasm ichidagi HTML) oldini oladi.
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # --- Healthcheck (log'siz) ---
    location = /healthz {
        proxy_pass http://django;
        access_log off;
    }

    # --- Django (gunicorn) ---
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Deploy paytida web bir zum tushsa (ulanish rad/timeout/502...) nginx
        # qayta uradi -> foydalanuvchi uzilishni sezmaydi (near-zero-downtime).
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 2s;
    }
}
