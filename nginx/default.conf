# ==============================================================================
# Drama.uz — nginx: FAQAT HTTP (80). Dev/lokal uchun (`--profile proxy`).
#
# PROD bu faylni ISHLATMAYDI: docker-compose.prod.yml o'rniga nginx/ssl.conf ni
# mount qiladi (Cloudflare Origin CA sertifikati bilan TLS). Location'lar/limit
# ikkalasida bir xil bo'lishi uchun umumiy tana snippets/app.conf da.
# ==============================================================================

# max_fails=0: web deploy paytida (qayta yaratilganda) nginx upstream'ni
# "o'lik" deb belgilab qo'ymaydi — qisqa uzilishda qayta uriradi [P13-T2].
upstream django {
    server web:8000 max_fails=0;
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/snippets/app.conf;
}
