# ==============================================================================
# Drama.uz — nginx: reverse proxy + statik/media + gzip + cache header.
# Prod'da statik GCS CDN (cdn.drama.uz) orqali kelsa, /static/ va /media/
# location'lari ishlatilmay turadi (zararsiz) — lokal/WhiteNoise rejimga tayyor.
# SSL terminatsiya tashqarida (Cloudflare); bu yerda faqat HTTP (80).
# ==============================================================================

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Video/poster yuklash uchun (DATA_UPLOAD_MAX_MEMORY_SIZE = 500MB)
    client_max_body_size 500M;

    # --- Gzip siqish ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/rss+xml
        font/woff font/woff2 image/svg+xml;

    # --- Statik fayllar (lokal volume) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Media fayllar ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Healthcheck (log'siz) ---
    location = /healthz {
        proxy_pass http://django;
        access_log off;
    }

    # --- Django (gunicorn) ---
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
